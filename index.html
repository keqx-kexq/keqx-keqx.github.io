<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виниловый рай — Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header glass-panel">
        <div class="logo"><i class="fa-solid fa-record-vinyl"></i>Виниловый рай</div>
        <nav class="nav-links">
            <a href="index.html">Главная</a>
            <a href="about.html">О проекте</a>
            <a href="gallery.html">Галерея</a>
            <a href="contacts.html">Контакты</a>
            <a href="delivery.html">Доставка</a>
            <a href="faq.html">FAQ</a>
            <a href="sale.html">Акции</a>
        </nav>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Поиск винила...">
        </div>
        <div class="header-icons">
            <button class="icon-btn" id="cartPanelBtn">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="badge" id="cartBadge">0</span>
            </button>
            <button class="icon-btn" id="favoritesPanelBtn">
                <i class="fa-regular fa-heart"></i>
                <span class="badge" id="favBadge">0</span>
            </button>
            <button class="icon-btn theme-toggle" id="themeSwitcher">
                <i class="fa-regular fa-sun"></i>
            </button>
            <button class="icon-btn" id="accountBtn"><i class="fa-regular fa-user"></i></button>
        </div>
    </div>

    <!-- Слайдер -->
    <div class="slider">
        <div class="slider-track">
            <div class="slide">
                <img src="https://cdn-images.dzcdn.net/images/cover/742aba8510ba803bea51d304cf2ca786/1000x1000.jpg" alt="Slide 1" 
                     onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%233a3a3c%22%2F%3E%3Ctext%20x%3D%22100%22%20y%3D%22110%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20fill%3D%22%23fff%22%20text-anchor%3D%22middle%22%3EMy%20Beautiful%3C%2Ftext%3E%3C%2Fsvg%3E'">
                <h3>My Beautiful Dark Twisted Fantasy</h3>
                <p>Kanye West</p>
            </div>
            <div class="slide">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a0/Blonde_-_Frank_Ocean.jpeg/250px-Blonde_-_Frank_Ocean.jpeg" alt="Slide 2" 
                     onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%233a3a3c%22%2F%3E%3Ctext%20x%3D%22100%22%20y%3D%22110%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20fill%3D%22%23fff%22%20text-anchor%3D%22middle%22%3EBlonde%3C%2Ftext%3E%3C%2Fsvg%3E'">
                <h3>Blonde</h3>
                <p>Frank Ocean</p>
            </div>
            <div class="slide">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/45/Billie_Eilish_-_Happier_Than_Ever.png/250px-Billie_Eilish_-_Happier_Than_Ever.png" alt="Slide 3" 
                     onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%233a3a3c%22%2F%3E%3Ctext%20x%3D%22100%22%20y%3D%22110%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20fill%3D%22%23fff%22%20text-anchor%3D%22middle%22%3EHappier%20Than%20Ever%3C%2Ftext%3E%3C%2Fsvg%3E'">
                <h3>Happier Than Ever</h3>
                <p>Billie Eilish</p>
            </div>
        </div>
        <button class="slider-btn slider-prev">❮</button>
        <button class="slider-btn slider-next">❯</button>
    </div>

    <!-- Категории -->
    <div class="category-row">
        <span class="category-chip active" data-filter="all">Все</span>
        <span class="category-chip" data-filter="vinyl">Винил</span>
        <span class="category-chip" data-filter="cassette">Кассеты</span>
        <span class="category-chip" data-filter="cd">CD</span>
    </div>

    <!-- Фильтры и сортировка (новые элементы) -->
    <div class="filters-row">
        <div class="price-filter">
            <span>Цена:</span>
            <input type="number" id="priceMin" placeholder="от" min="0" step="100">
            <span>—</span>
            <input type="number" id="priceMax" placeholder="до" min="0" step="100">
        </div>
        <div class="sort-filter">
            <label>Сортировать:</label>
            <select id="sortSelect">
                <option value="default">По умолчанию</option>
                <option value="name_asc">Название (А→Я)</option>
                <option value="name_desc">Название (Я→А)</option>
                <option value="price_asc">Цена (сначала дешёвые)</option>
                <option value="price_desc">Цена (сначала дорогие)</option>
            </select>
        </div>
        <button id="resetFiltersBtn" class="reset-btn">Сбросить фильтры</button>
    </div>

    <!-- Сетка товаров -->
    <div class="product-grid" id="productGrid"></div>

    <!-- Модальное окно товара -->
    <div class="product-modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-flex" id="modalContent"></div>
        </div>
    </div>

    <!-- Модальное окно авторизации -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="authModalClose">×</button>
            <div id="authModalContainer"></div>
        </div>
    </div>

    <!-- Боковая панель корзины -->
    <div class="side-panel" id="cartPanel">
        <div class="panel-header">Корзина <button class="close-panel" id="closeCart">×</button></div>
        <div class="panel-items" id="cartItemsList"></div>
        <div class="panel-footer">
            <div class="total-row"><span>Итого</span> <span id="cartTotal">0 ₽</span></div>
            <button class="checkout-btn" id="checkoutBtn">Оформить · безопасно</button>
        </div>
    </div>

    <!-- Боковая панель избранного -->
    <div class="side-panel" id="favoritesPanel">
        <div class="panel-header">Избранное <button class="close-panel" id="closeFav">×</button></div>
        <div class="panel-items" id="favItemsList"></div>
        <div class="panel-footer" style="border:none; text-align:center; color:var(--text-secondary);"><i class="fa-regular fa-star"></i> сохранено</div>
    </div>

    <!-- Оверлей -->
    <div class="overlay" id="overlay"></div>

    <!-- Тост -->
    <div class="toast-mini" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
